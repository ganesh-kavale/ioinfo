<header class="header">
  <div class="container">
    <!-- Top Section: Logo, Contact Info, and Hamburger -->
    <div class="section">
      <!-- Left: Logo & Brand -->
      <div class="logo-contact-wrapper">
        <div class="logo-section">
          <img src="assets/images/ioinfo.svg" alt="Logo" class="logo" />
          <img src="assets/images/ioinfosystemai.svg" alt="Logo" class="logoname" />    
        </div>

        <!-- Contact Info -->
        <div class="contact-info">
          <span class="contact-item">📞 +91-9067909181</span>
          <span class="contact-item">✉️ krishna.iosys.ai&#64;gmail.com</span>
        </div>
      </div>

      <!-- Right: Hamburger -->
      <div class="hamburger" (click)="toggleMenu()">☰</div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="categories">
    <nav class="nav-links" [class.show]="isMenuOpen">
      <ng-container *ngFor="let node of navigationNodes; let i = index">
        <a class="nav-link active" [href]="node.url">{{ node.name }}</a>
        <span *ngIf="i < navigationNodes.length - 1" class="separator">|</span>
      </ng-container>
    </nav>
  </div>
</header>
