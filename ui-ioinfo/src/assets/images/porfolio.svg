<svg width="260" height="44" viewBox="0 0 260 44" xmlns="http://www.w3.org/2000/svg">

  <!-- Morpankh Accent Gradient -->
  <defs>
    <linearGradient id="morpankhGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f8a70"/>
      <stop offset="40%" stop-color="#2e6f9e"/>
      <stop offset="75%" stop-color="#7e5a9b"/>
      <stop offset="100%" stop-color="#c6a82b"/>
    </linearGradient>
  </defs>

  <style>
    .name {
      font-family: Inter, Arial, sans-serif;
      font-weight: 600;
      font-size: 20px;
      fill: #020617;
	  }
    .sub {
      font-family: Inter, Arial, sans-serif;
      font-size: 8.5px;
      fill: #6b7280;
      letter-spacing: 1.5px;
	 color:morpankhGradient;

    }
  </style>

  <!-- Enlarged neutral badge -->
  <circle cx="18" cy="22" r="16" fill="#f1f5f9"/>

  <!-- 4-point Morpankh star perfectly touching circle at 4 ends -->
  <polygon
    points="18,6 22,18 34,22 22,26 18,38 14,26 2,22 14,18"
    fill="none"
    stroke="url(#morpankhGradient)"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- Name -->
  <text x="42.5" y="20" class="name">Ganesh Kavale</text>

  <!-- Subtitle -->
  <text x="42.5" y="34" class="sub">SOFTWARE DEVELOPER</text>

</svg>
